server {

	server_name stock.tanya.9farm.com;

	listen [::]:443 ssl;

	ssl_certificate	    ssl.d/tanya.9farm.com.crt;
	ssl_certificate_key ssl.d/tanya.9farm.com.key;

	access_log /log/stock/access.log;
	error_log  /log/stock/error.log;

	root /www/stock/client/dist;

	location / {
	}

	location = /robots.txt  {
		access_log off;
		log_not_found off;
	}

	location = /favicon.ico {
		expires max;
		access_log off;
		log_not_found off;
	}

	location = /favicon.webp {
		expires max;
		access_log off;
		log_not_found off;
	}
}

server {

	server_name stock.tanya.9farm.com;

	listen [::]:80;

	location / {
		return 301 https://$host$request_uri;
	}
}
